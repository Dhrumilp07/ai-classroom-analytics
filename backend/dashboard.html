<!DOCTYPE html>
<html>
<head>
<title>Classroom Analytics Dashboard</title>
</head>

<body>

<h1>AI Classroom Analytics</h1>

<h2 id="students"></h2>
<h2 id="engagement"></h2>

<script>

async function loadData(){

let response = await fetch("http://127.0.0.1:5000/analytics")
let data = await response.json()

document.getElementById("students").innerHTML =
"Students Present: " + data.students_present

document.getElementById("engagement").innerHTML =
"Engagement Score: " + data.engagement_score + "%"

}

setInterval(loadData,2000)

</script>

</body>
</html>
